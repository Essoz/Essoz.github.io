          "Distributed High Performance Computing" (D-HPC for short).  
          The project aims to provide highly-available and low-latency computational services in the city by deploying a distributed supercomputer network. 
          D-HPC supports the construction of "Smart City" and "Industrial Network". It also make user experience better in terms of cloud-based apps, such as cloud-gaming.
